spring:
  application:
    name: sofit-admin

  # 활성 프로파일 (local / dev / release)
  profiles:
    active: local

  # JPA
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
    show-sql: false

  # Redis 세션
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  # Spring Session (Redis 사용)
  session:
    store-type: redis
    timeout: 1800  # 30분

  # Spring Batch — 배치 메타 테이블 자동 생성 비활성화 (직접 관리)
  batch:
    jdbc:
      initialize-schema: never

server:
  port: 8081
  servlet:
    context-path: /

# SpringDoc (Swagger UI)
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs
