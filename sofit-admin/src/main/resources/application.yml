spring:
  application:
    name: sofit-admin

  # 활성 프로파일 (dev / release)
  profiles:
    active: dev

  # MySQL 데이터소스
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${DB_HOST}:3306/sofit?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  # JPA
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
    show-sql: false

  # Redis 세션
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}

  # Spring Session (Redis 사용)
  session:
    store-type: redis
    timeout: 1800  # 30분

  # Spring Batch — 배치 메타 테이블 자동 생성 비활성화 (직접 관리)
  batch:
    jdbc:
      initialize-schema: never

server:
  port: 8081
  servlet:
    context-path: /
