spring:
  application:
    name: sofit-user

  # 활성 프로파일 (local / dev / release)
  profiles:
    active: local

  # JPA
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
    show-sql: false

  # Redis 세션
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  # Spring Session (Redis 사용)
  session:
    store-type: redis
    timeout: 1800  # 30분

server:
  port: 8080
  servlet:
    context-path: /

# External Mock 서버
external:
  mock:
    url: ${EXTERNAL_MOCK_URL:http://localhost:9090}

# SpringDoc (Swagger UI)
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs
