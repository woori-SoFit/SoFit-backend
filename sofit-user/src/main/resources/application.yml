spring:
  application:
    name: sofit-user

  # 활성 프로파일 (dev / release)
  profiles:
    active: dev

  # MySQL 데이터소스
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${DB_HOST:localhost}:3306/sofit?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}

  # JPA
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
    show-sql: false

  # Redis 세션
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  # Spring Session (Redis 사용)
  session:
    store-type: redis
    timeout: 1800  # 30분

server:
  port: 8080
  servlet:
    context-path: /

# External Mock 서버
external:
  mock:
    url: ${EXTERNAL_MOCK_URL:http://localhost:9090}
